# Generates one ArgoCD Application per environment. Each Application renders the Helm chart
# from the app repo and layers the base env values plus this repo's override values.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: data-platform
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - env: dev
            namespace: data-platform-dev
            autoSync: "true"
          - env: staging
            namespace: data-platform-staging
            autoSync: "true"
          - env: production
            namespace: data-platform-prod
            autoSync: "false"   # production requires manual sync/approval
  template:
    metadata:
      name: 'data-platform-{{.env}}'
      labels:
        environment: '{{.env}}'
    spec:
      project: default
      sources:
        # Helm chart + base per-env values come from the application repo.
        - repoURL: https://github.com/YOUR_ORG/data-platform.git
          targetRevision: main
          path: deploy/helm/data-platform
          helm:
            valueFiles:
              - 'values-{{.env}}.yaml'
              - '$values/environments/{{.env}}/values.yaml'
        # Image tags / promotion overrides come from this gitops repo.
        - repoURL: https://github.com/YOUR_ORG/data-platform-gitops.git
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 5m
